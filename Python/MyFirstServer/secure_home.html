<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Chat Room</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .chat-box { border: 1px solid #ccc; padding: 20px; height: 300px; overflow-y: scroll; background: #f9f9f9; margin-bottom: 20px; }
        .msg { margin-bottom: 10px; padding: 5px 10px; border-radius: 5px; }
        .user-name { font-weight: bold; color: #2b6cb0; }
    </style>
</head>
<body>
    <h1>Welcome to the Chat Room, USERNAME!</h1>
    <p><a href="/logout">Logout</a></p>

    <div class="chat-box">
        CHAT_HISTORY
    </div>

    <form method="POST" action="/send_message">
        <input type="text" name="chat_msg" placeholder="Type a message..." style="width: 70%; padding: 10px;" required autofocus>
        <button type="submit" style="padding: 10px 20px;">Send</button>
    </form>
    
    <br>
    <button onclick="location.reload();">Refresh Chat</button>
</body>
</html>
